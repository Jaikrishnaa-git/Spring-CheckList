<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Todo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.4/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-DQvkBjpPgn7RC31MCQoOeC9TI2kdqa4+BSgNMNj8v77fdC77Kj5zpWFTJaaAoMbC" crossorigin="anonymous">
    <style>
        .text-strikeThrough{
            text-decoration: line-through;
            color: grey;
        }
    </style>
</head>
<body>


    <div class="container mt-5" >
        <h1> Todo List</h1>
        <form action="/" method="post">
            <div>
                <input type="text" name="title" placeholder="Add a Task" required>
            </div>
            <div>
                <button class="mt-lg-5" type="submit">Add</button>
            </div>
        </form>
        <div>
            <th:block th:each="task : ${tasks}">
                <div>
                    <span th:classappend="${task.completed} ? 'text-strikeThrough'" th:text="${task.title}"></span>
                    <div>
                        <a th:href="@{{id}/toggle(id=${task.id})}" class="btn btn-primary">Toggle</a>
                        <a th:href="@{{id}/delete(id=${task.id})}" class="btn btn-danger">Delete</a>
                    </div>
                </div>
            </th:block>
        </div>
    </div>

</body>
</html>
